<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Display - Boxplay X NUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="display">
    <div class="header">
        <div class="container navbar">
            <a class="brand" href="../beranda.html">
                <span class="brand-icon"><i class="fas fa-bolt"></i></span>
                <span class="brand-name">BOXPLAY X NUD</span>
            </a>
            <div class="nav-actions">
                <button class="btn btn-secondary" onclick="navigateTo('../beranda.html')">Beranda</button>
            </div>
            <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
        <nav class="mobile-menu" id="mobile-menu">
            <div class="mobile-menu-content">
                <a href="../beranda.html" class="mobile-menu-item">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </a>
                <a href="../booking.html" class="mobile-menu-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Buat Antrian</span>
                </a>
                <a href="../login.html" class="mobile-menu-item">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </a>
                <a href="../pages/display.html" class="mobile-menu-item">
                    <i class="fas fa-tv"></i>
                    <span>Tampilan TV</span>
                </a>
            </div>
        </nav>
    </div>

    <main class="container" style="padding-top:5rem; padding-bottom:4rem;">
        <section class="card page-card" style="text-align:center; padding:4rem 2rem;">
            <div style="display:inline-flex; align-items:center; gap:1rem; margin-bottom:1.5rem;">
                <span class="brand-icon"><i class="fas fa-tv"></i></span>
                <div style="text-align:left;">
                    <div class="tag">Tampilan Antrian</div>
                    <h1 style="font-size:2.5rem; margin-top:0.5rem;">Nomor yang sedang dipanggil</h1>
                </div>
            </div>
            <div style="margin: 2.5rem auto; max-width: 700px; padding: 3rem; border-radius: 32px; background: rgba(255,255,255,0.03); border: 1px solid var(--border);">
                <div style="color: var(--muted); text-transform: uppercase; letter-spacing:0.2em; margin-bottom:1rem;">Sekarang dipanggil</div>
                <div id="display-current-number" style="font-size:7rem; font-weight:900; color:var(--gold); letter-spacing:-0.04em;">--</div>
                <div id="display-status" style="font-size:1.2rem; color:var(--text); margin-top:1rem;">Menunggu panggilan</div>
                <p id="display-note" style="color:var(--muted); margin-top:1rem; line-height:1.75;">Tampilan ini akan update otomatis setiap kali admin memanggil nomor baru.</p>
            </div>
            <button class="btn btn-secondary" onclick="navigateTo('../beranda.html')">Kembali ke Beranda</button>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
