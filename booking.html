<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Antrian - Boxplay X NUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="booking">
    <div class="header">
        <div class="container navbar">
            <a class="brand" href="beranda.html">
                <span class="brand-icon"><i class="fas fa-bolt"></i></span>
                <span class="brand-name">BOXPLAY X NUD</span>
            </a>
            <div class="nav-actions">
                <button class="btn btn-secondary" onclick="navigateTo('beranda.html')">Beranda</button>
                <button class="btn btn-secondary" onclick="navigateTo('login.html')">Admin</button>
            </div>
            <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
        <nav class="mobile-menu" id="mobile-menu">
            <div class="mobile-menu-content">
                <a href="beranda.html" class="mobile-menu-item">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </a>
                <a href="booking.html" class="mobile-menu-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Buat Antrian</span>
                </a>
                <a href="login.html" class="mobile-menu-item">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </a>
                <a href="pages/display.html" class="mobile-menu-item">
                    <i class="fas fa-tv"></i>
                    <span>Tampilan TV</span>
                </a>
            </div>
        </nav>
    </div>

    <main class="container">
        <section class="section">
            <div class="form-card card">
                <div class="dashboard-header">
                    <div>
                        <p class="tag">Form Antrian</p>
                        <h2>Pesan Nomor Antrian Sekarang</h2>
                        <p class="section-subtitle">Isi nama dan nomor WhatsApp, sistem akan memproses nomor antrian otomatis.</p>
                    </div>
                </div>
                <form id="booking-form">
                    <div id="unit-selection-section" style="display: none;">
                        <div class="form-group">
                            <label>Unit yang Dipilih</label>
                            <div id="selected-unit-display" class="selected-unit-card">
                                <i class="fas fa-playstation"></i>
                                <span id="selected-unit-label">Memuat...</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="booking-name">Nama Lengkap</label>
                        <input id="booking-name" class="form-input" type="text" placeholder="Masukkan nama Anda" required>
                    </div>
                    <div class="form-group">
                        <label for="booking-phone">Nomor HP (Indonesia)</label>
                        <input id="booking-phone" class="form-input" type="tel" placeholder="0812xxxxxxxx" required>
                    </div>
                    <div id="branch-selection-section">
                        <div class="form-group">
                            <label for="booking-branch">Pilih Cabang</label>
                            <select id="booking-branch" class="form-select"></select>
                        </div>
                    </div>
                    <div id="unit-selection-section-alt" style="display: none;">
                        <div class="form-group">
                            <label for="booking-unit">Pilih Unit</label>
                            <select id="booking-unit" class="form-select"></select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Kirim Antrian</button>
                </form>
            </div>
        </section>
    </main>

    <div id="app-toast" class="toast"></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
