<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomor Antrian - Boxplay X NUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="waiting">
    <div class="header">
        <div class="container navbar">
            <a class="brand" href="beranda.html">
                <span class="brand-icon"><i class="fas fa-bolt"></i></span>
                <span class="brand-name">BOXPLAYID</span>
            </a>
            <div class="nav-actions">
                <button class="btn btn-secondary" onclick="navigateTo('beranda.html')">Beranda</button>
                <button class="btn btn-secondary" onclick="navigateTo('booking.html')">Buat Antrian Baru</button>
            </div>
            <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
        <nav class="mobile-menu" id="mobile-menu">
            <div class="mobile-menu-content">
                <a href="beranda.html" class="mobile-menu-item">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </a>
                <a href="booking.html" class="mobile-menu-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Buat Antrian</span>
                </a>
                <a href="login.html" class="mobile-menu-item">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </a>
                <a href="pages/display.html" class="mobile-menu-item">
                    <i class="fas fa-tv"></i>
                    <span>Tampilan TV</span>
                </a>
            </div>
        </nav>
    </div>

    <main class="container">
        <section class="section" id="waiting-content">
            <div class="form-card card" style="text-align:center; padding:3rem 2rem;">
                <div style="margin-bottom:1.5rem;">
                    <span class="brand-icon"><i class="fas fa-ticket-alt"></i></span>
                </div>
                <h2>Booking Antrian Berhasil</h2>
                <p class="section-subtitle">Tunjukkan nomor antrian kepada petugas ketika dipanggil.</p>
                <div class="page-card" style="margin-top:2rem;">
                    <div style="font-size:0.9rem; color:var(--muted); margin-bottom:0.75rem; letter-spacing:0.15em; text-transform:uppercase;">Nomor Antrian</div>
                    <div id="waiting-number" style="font-size: 5rem; font-weight:900; color:var(--gold); margin-bottom:1rem;">00</div>
                    <div style="display:grid; gap:0.8rem; color:var(--text); text-align:left;">
                        <div><strong>Nama:</strong> <span id="display-name">-</span></div>
                        <div><strong>Nomor HP:</strong> <span id="display-phone">-</span></div>
                        <div><strong>Cabang:</strong> <span id="display-branch">-</span></div>
                    </div>
                </div>
                <button class="btn btn-primary" style="margin-top:2rem;" onclick="navigateTo('beranda.html')">Kembali ke Beranda</button>
            </div>
        </section>
    </main>

    <div id="app-toast" class="toast"></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
