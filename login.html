<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Boxplay X NUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
    <div class="header">
        <div class="container navbar">
            <a class="brand" href="beranda.html">
                <span class="brand-icon"><i class="fas fa-bolt"></i></span>
                <span class="brand-name">BOXPLAY X NUD</span>
            </a>
            <div class="nav-actions">
                <button class="btn btn-secondary" onclick="navigateTo('beranda.html')">Beranda</button>
                <button class="btn btn-secondary" onclick="navigateTo('booking.html')">Buat Antrian</button>
            </div>
            <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
        <nav class="mobile-menu" id="mobile-menu">
            <div class="mobile-menu-content">
                <a href="beranda.html" class="mobile-menu-item">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </a>
                <a href="booking.html" class="mobile-menu-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>Buat Antrian</span>
                </a>
                <a href="login.html" class="mobile-menu-item">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </a>
                <a href="pages/display.html" class="mobile-menu-item">
                    <i class="fas fa-tv"></i>
                    <span>Tampilan TV</span>
                </a>
            </div>
        </nav>
    </div>

    <main class="container">
        <section class="section">
            <div class="auth-card card">
                <div style="text-align:center; margin-bottom:2rem;">
                    <span class="brand-icon"><i class="fas fa-shield-alt"></i></span>
                    <h2>Login Admin</h2>
                    <p class="section-subtitle">Masuk menggunakan akun admin untuk mengelola antrian.</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input id="login-username" class="form-input" type="text" placeholder="admin" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input id="login-password" class="form-input" type="password" placeholder="12345" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Masuk</button>
                </form>
                <button class="btn btn-secondary" style="margin-top:1rem; width:100%;" onclick="navigateTo('beranda.html')">Kembali ke Beranda</button>
            </div>
        </section>
    </main>

    <div id="app-toast" class="toast"></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
